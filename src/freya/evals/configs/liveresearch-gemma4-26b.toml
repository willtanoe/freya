# DeepResearchBench: Gemma-4-26B-A4B-it (vLLM, 1 GPU)
[meta]
name = "liveresearch-gemma4-26b"
description = "DeepResearchBench on google/gemma-4-26B-A4B-it"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
max_tokens = 4096
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/gemma4-26b/liveresearch/"
seed = 42

[[models]]
name = "google/gemma-4-26B-A4B-it"
engine = "vllm"
num_gpus = 1

[[benchmarks]]
name = "liveresearch"
backend = "freya-agent"
agent = "monitor_operative"
max_samples = 50
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]
