# DeepResearchBench: claude-opus-4-6
[meta]
name = "liveresearch-claude-opus"
description = "DeepResearchBench deep research benchmark on claude-opus-4-6"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
max_tokens = 4096

[run]
max_workers = 1
output_dir = "results/liveresearch-claude-opus/"
seed = 42

[[models]]
name = "claude-opus-4-6"
engine = "cloud"

[[benchmarks]]
name = "liveresearch"
backend = "freya-agent"
agent = "monitor_operative"
max_samples = 50
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]
