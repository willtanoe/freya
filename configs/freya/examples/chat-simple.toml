# Simple Chat — cloud-first conversational AI, no tools
# Copy to ~/.freya/config.toml
#
# Requires at least one cloud API key (set via UI or cloud-keys.env).
#
# Usage:
#   freya ask "What is quantum computing?"
#   freya chat                  # interactive chat session
#   freya serve                 # start API server for browser/desktop app

[engine]
default = "cloud"

[intelligence]
default_model = "gpt-4o-mini"        # Fast and affordable
# default_model = "gpt-4o"           # Better quality
# default_model = "deepseek/deepseek-chat"  # DeepSeek alternative

[agent]
default_agent = "simple"             # Single-turn, no tools

[server]
host = "0.0.0.0"
port = 8000
