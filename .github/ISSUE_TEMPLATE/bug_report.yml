name: Bug Report
description: Report a bug or unexpected behavior
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below to help us investigate.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `freya ask "..."`
        2. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
  - type: dropdown
    id: python
    attributes:
      label: Python Version
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
    validations:
      required: true
  - type: dropdown
    id: hardware
    attributes:
      label: Hardware
      options:
        - NVIDIA GPU
        - AMD GPU
        - Apple Silicon
        - CPU only
    validations:
      required: true
  - type: dropdown
    id: engine
    attributes:
      label: Engine
      description: Which inference engine are you using?
      options:
        - Ollama
        - vLLM
        - llama.cpp
        - SGLang
        - MLX
        - Cloud (OpenAI/Anthropic/Google)
        - LiteLLM
        - Other
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / Traceback
      description: Paste any relevant logs or traceback here.
      render: shell
    validations:
      required: false
